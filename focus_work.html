<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무일지</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d14;
    --surface: #13131f;
    --border: #1e1e32;
    --accent: #7c6aff;
    --accent2: #ff6a6a;
    --green: #4dffb4;
    --yellow: #f9e2af;
    --blue: #89b4fa;
    --peach: #fab387;
    --pink: #f38ba8;
    --text: #e8e8f0;
    --muted: #8888aa;
    --card: #16162a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Gowun Dodum', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 0 40px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(124,106,255,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(77,255,180,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 500px;
    padding: 0 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
  }

  .header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .header p { color: var(--muted); font-size: 12px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 12px;
  }

  .task-label {
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    font-family: 'Space Mono', monospace;
  }

  .task-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .task-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,255,0.12); }
  .task-input:disabled { opacity: 0.5; cursor: not-allowed; }
  .task-input::placeholder { color: var(--muted); }

  /* 타이머 영역 */
  .timer-section { text-align: center; padding: 12px 0 8px; }

  .timer-label {
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
    margin-bottom: 4px;
    height: 16px;
  }

  .timer-label.main { color: var(--green); }
  .timer-label.sub { color: var(--peach); }
  .timer-label.idle { color: var(--muted); }

  .timer-display {
    font-family: 'Space Mono', monospace;
    font-size: 48px;
    font-weight: 700;
    letter-spacing: 0.05em;
    line-height: 1;
    transition: color 0.3s;
  }

  .timer-display.main { color: var(--green); }
  .timer-display.sub { color: var(--peach); }
  .timer-display.idle { color: var(--muted); }

  /* 상태 배지 */
  .status-badge {
    display: inline-block;
    margin-top: 10px;
    padding: 4px 14px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    transition: all 0.3s;
  }

  .status-badge.idle { background: var(--border); color: var(--muted); }
  .status-badge.focus { background: rgba(77,255,180,0.15); color: var(--green); border: 1px solid rgba(77,255,180,0.3); }
  .status-badge.paused { background: rgba(137,180,250,0.15); color: var(--blue); border: 1px solid rgba(137,180,250,0.3); }
  .status-badge.errand { background: rgba(250,179,135,0.15); color: var(--peach); border: 1px solid rgba(250,179,135,0.3); }
  .status-badge.meal { background: rgba(166,227,161,0.15); color: #a6e3a1; border: 1px solid rgba(166,227,161,0.3); }
  .status-badge.meeting { background: rgba(124,106,255,0.15); color: var(--accent); border: 1px solid rgba(124,106,255,0.3); }
  .status-badge.rest { background: rgba(243,139,168,0.15); color: var(--pink); border: 1px solid rgba(243,139,168,0.3); }

  .next-checkin {
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .next-checkin span { color: var(--peach); }

  .progress-wrap {
    margin-top: 12px;
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 99px;
    width: 0%;
    transition: width 1s linear;
  }

  /* 메인 버튼 */
  .main-btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  .btn {
    padding: 13px;
    border-radius: 11px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    letter-spacing: 0.02em;
  }

  .btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

  .btn-focus { background: var(--accent); color: #fff; }
  .btn-focus:not(:disabled):hover { background: #9580ff; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,106,255,0.3); }

  .btn-stop { background: transparent; border: 1px solid var(--accent2) !important; color: var(--accent2); }
  .btn-stop:not(:disabled):hover { background: rgba(255,106,106,0.08); }

  .btn-review { background: transparent; border: 1px solid var(--yellow) !important; color: var(--yellow); }
  .btn-review:not(:disabled):hover { background: rgba(249,226,175,0.08); }

  .btn-pause { background: transparent; border: 1px solid var(--blue) !important; color: var(--blue); }
  .btn-pause:not(:disabled):hover { background: rgba(137,180,250,0.08); }

  .btn-resume { background: var(--green); color: #0d0d14; }
  .btn-resume:not(:disabled):hover { background: #6fffcc; transform: translateY(-1px); }

  /* 인터럽트 버튼들 */
  .interrupt-section {
    margin-bottom: 12px;
  }

  .interrupt-label {
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
    margin-bottom: 8px;
  }

  .interrupt-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 8px;
  }

  .btn-interrupt {
    padding: 10px 6px;
    border-radius: 10px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    text-align: center;
    line-height: 1.4;
  }

  .btn-errand { background: rgba(250,179,135,0.15); border: 1px solid rgba(250,179,135,0.35) !important; color: var(--peach); }
  .btn-errand:not(:disabled):hover { background: rgba(250,179,135,0.25); transform: translateY(-1px); }

  .btn-meal { background: rgba(166,227,161,0.15); border: 1px solid rgba(166,227,161,0.35) !important; color: #a6e3a1; }
  .btn-meal:not(:disabled):hover { background: rgba(166,227,161,0.25); transform: translateY(-1px); }

  .btn-meeting { background: rgba(124,106,255,0.15); border: 1px solid rgba(124,106,255,0.35) !important; color: var(--accent); }
  .btn-meeting:not(:disabled):hover { background: rgba(124,106,255,0.25); transform: translateY(-1px); }

  .btn-rest { background: rgba(243,139,168,0.15); border: 1px solid rgba(243,139,168,0.35) !important; color: var(--pink); }
  .btn-rest:not(:disabled):hover { background: rgba(243,139,168,0.25); transform: translateY(-1px); }

  .btn-interrupt:disabled { opacity: 0.2; cursor: not-allowed; transform: none !important; }

  /* 복귀 버튼 (인터럽트 중) */
  .return-row {
    display: none;
    margin-bottom: 12px;
  }

  .return-row.show { display: block; }

  .btn-return {
    width: 100%;
    padding: 14px;
    border-radius: 11px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    background: var(--green);
    color: #0d0d14;
    animation: pulseGlow 2s ease infinite;
  }

  .btn-return:hover { background: #6fffcc; transform: translateY(-1px); }

  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(77,255,180,0.3); }
    50% { box-shadow: 0 0 0 6px rgba(77,255,180,0); }
  }

  /* 로그 */
  .log-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .log-title {
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
  }

  .log-actions { display: flex; gap: 12px; }

  .log-btn {
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'Gowun Dodum', sans-serif;
    transition: color 0.2s;
  }

  .log-btn:hover { color: var(--accent); }
  .log-btn.danger:hover { color: var(--accent2); }

  .log-list {
    list-style: none;
    max-height: 200px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .log-list::-webkit-scrollbar { width: 4px; }
  .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .log-item {
    display: flex;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    animation: fadeIn 0.3s ease;
  }

  .log-item:last-child { border-bottom: none; }

  .log-time {
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    flex-shrink: 0;
    padding-top: 2px;
    min-width: 38px;
  }

  .log-text { color: var(--text); line-height: 1.5; }
  .log-text.focus { color: var(--green); }
  .log-text.distract { color: var(--accent2); }
  .log-text.system { color: var(--accent); }
  .log-text.review { color: var(--yellow); }
  .log-text.errand { color: var(--peach); }
  .log-text.meal { color: #a6e3a1; }
  .log-text.meeting { color: var(--accent); }
  .log-text.rest { color: var(--pink); }
  .log-text.return { color: var(--green); }

  .log-empty { color: var(--muted); font-size: 12px; text-align: center; padding: 16px 0; }

  /* 오버레이 */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .overlay.show { opacity: 1; pointer-events: all; }

  .popup {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    transform: translateY(20px);
    transition: transform 0.25s;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }

  .overlay.show .popup { transform: translateY(0); }

  .popup-icon { font-size: 36px; margin-bottom: 12px; display: block; animation: pulse 1.5s ease infinite; }
  .popup-icon.static { animation: none; }

  .popup-elapsed { font-size: 13px; color: var(--green); font-family: 'Space Mono', monospace; letter-spacing: 0.15em; margin-bottom: 8px; }

  .popup-question { font-size: 16px; line-height: 1.6; margin-bottom: 16px; color: var(--text); }
  .popup-question strong { color: var(--accent); }

  .popup-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 13px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    margin-bottom: 13px;
    transition: border-color 0.2s;
  }

  .popup-input:focus { border-color: var(--accent); }
  .popup-input::placeholder { color: var(--muted); }

  .popup-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .popup-buttons.single { grid-template-columns: 1fr; }

  .popup-btn {
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 700;
  }

  .popup-btn.yes { background: var(--green); color: #0d0d14; }
  .popup-btn.yes:hover { background: #6fffcc; transform: translateY(-1px); }
  .popup-btn.no { background: transparent; border: 1px solid var(--accent2) !important; color: var(--accent2); }
  .popup-btn.no:hover { background: rgba(255,106,106,0.1); }
  .popup-btn.neutral { background: transparent; border: 1px solid var(--muted) !important; color: var(--muted); }
  .popup-btn.neutral:hover { border-color: var(--text) !important; color: var(--text); }
  .popup-btn.finish { background: var(--yellow); color: #0d0d14; }
  .popup-btn.finish:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .popup-btn.finish:not(:disabled):hover { background: #fdeeba; transform: translateY(-1px); }
  .popup-btn.errand-start { background: var(--peach); color: #0d0d14; }
  .popup-btn.errand-start:hover { background: #ffc99e; transform: translateY(-1px); }

  /* 잡무 입력 팝업 */
  .errand-popup .popup-icon { animation: none; }

  /* 검토 체크리스트 */
  .review-checklist { text-align: left; margin-bottom: 16px; }

  .review-item {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }

  .review-item:last-child { border-bottom: none; }

  .review-check {
    width: 19px;
    height: 19px;
    border: 2px solid var(--muted);
    border-radius: 5px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 11px;
  }

  .review-item.checked .review-check { background: var(--yellow); border-color: var(--yellow); color: #0d0d14; }
  .review-item-text { font-size: 13px; color: var(--text); line-height: 1.4; }

  .review-progress { font-size: 13px; color: var(--muted); font-family: 'Space Mono', monospace; margin-bottom: 12px; }
  .review-progress span { color: var(--yellow); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

  /* 할일 목록 */
  .todo-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 16px;
  }
  .todo-card-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
    margin-bottom: 12px;
  }
  .todo-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .todo-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .todo-num {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    width: 16px;
    flex-shrink: 0;
  }
  .todo-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .todo-input:focus { border-color: var(--accent); }
  .todo-input.done {
    text-decoration: line-through;
    opacity: 0.4;
  }
  .todo-input:disabled {
    cursor: default;
  }

  .todo-pick-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 11px;
    padding: 4px 8px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .todo-pick-btn:hover { border-color: var(--accent); color: var(--accent); }
  .todo-pick-btn:disabled { opacity: 0.2; cursor: not-allowed; }

  /* 로그인 화면 */
  #loginScreen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 28px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }

  .login-title {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.2em;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .login-sub {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .login-field {
    margin-bottom: 14px;
  }

  .login-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
    margin-bottom: 6px;
    display: block;
  }

  .login-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .login-input:focus { border-color: var(--accent); }

  .login-btn {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    border: none;
    border-radius: 11px;
    background: var(--accent);
    color: #fff;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .login-btn:hover { background: #9580ff; transform: translateY(-1px); }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .login-error {
    text-align: center;
    font-size: 13px;
    color: var(--accent2);
    margin-top: 12px;
    min-height: 20px;
  }
</style>
</head>
<body>
<div id="loginScreen">
  <div class="login-box">
    <div class="login-title">📋 업무일지</div>
    <div class="login-sub">로그인 후 이용할 수 있어요</div>
    <div class="login-field">
      <label class="login-label">아이디</label>
      <input type="text" class="login-input" id="loginId" placeholder="아이디 입력" autocomplete="username" />
    </div>
    <div class="login-field">
      <label class="login-label">비밀번호</label>
      <input type="password" class="login-input" id="loginPw" placeholder="비밀번호 입력" autocomplete="current-password" />
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="loginError"></div>
    <div style="text-align:center; margin-top:16px;">
      <button onclick="showRegister()" style="background:none; border:none; color:var(--muted); font-size:13px; cursor:pointer; font-family:'Gowun Dodum',sans-serif; text-decoration:underline;">회원가입</button>
    </div>
  </div>
</div>

<!-- 회원가입 화면 -->
<div id="registerScreen" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:201; align-items:center; justify-content:center; padding:24px;">
  <div class="login-box">
    <div class="login-title">📋 회원가입</div>
    <div class="login-sub">업무일지 계정을 만들어요</div>
    <div class="login-field">
      <label class="login-label">아이디</label>
      <input type="text" class="login-input" id="regId" placeholder="영문/숫자 4자 이상" maxlength="20" />
    </div>
    <div class="login-field">
      <label class="login-label">비밀번호</label>
      <input type="password" class="login-input" id="regPw" placeholder="6자 이상" maxlength="30" />
    </div>
    <div class="login-field">
      <label class="login-label">닉네임</label>

<script>
  // ── 상태 ───────────────────────────────────────
  // mode: 'idle' | 'focus' | 'paused' | 'errand' | 'meal' | 'meeting' | 'rest'
  let mode = 'idle';
  let isRunning = false; // 절전 보정용
  let authUser = { username: '', password: '', name: '' }; // 로그인 정보
  let todoList = ['','','','','']; // 할일 목록
  let currentTodoIdx = 0; // 현재 할일 인덱스
  let mainSeconds = 0;       // 집중 누적 시간
  let subSeconds = 0;        // 현재 중단 경과 시간
  let errandSeconds = 0;     // 잡무 누적 시간
  let totalFocusSeconds = 0; // 전체 집중(메인+잡무) 누적

  const TOTAL_KEY = 'total_focus_seconds';
  const TOTAL_DATE_KEY = 'total_focus_date';

  function loadTotalFocus() {
    try {
      // 새벽 3시 리셋 체크
      const savedDate = localStorage.getItem(TOTAL_DATE_KEY);
      const now = new Date();
      // 오늘 새벽 3시
      const resetTime = new Date(now);
      resetTime.setHours(3, 0, 0, 0);
      // 어제 새벽 3시
      const lastReset = new Date(resetTime);
      lastReset.setDate(lastReset.getDate() - 1);

      const saved = parseInt(localStorage.getItem(TOTAL_KEY) || '0');
      const savedDateObj = savedDate ? new Date(savedDate) : null;

      // 마지막 저장이 오늘 새벽 3시 이전이면 리셋
      if (!savedDateObj || savedDateObj < resetTime && now >= resetTime) {
        totalFocusSeconds = 0;
        saveTotalFocus();
      } else {
        totalFocusSeconds = saved;
      }
      document.getElementById('totalFocusDisplay').textContent = fmt(totalFocusSeconds);
    } catch(e) {}
  }

  function saveTotalFocus() {
    localStorage.setItem(TOTAL_KEY, totalFocusSeconds);
    localStorage.setItem(TOTAL_DATE_KEY, new Date().toISOString());
    sheetPost({ action: 'saveTotalFocus', seconds: totalFocusSeconds });
  }

  // 새벽 3시 자동 리셋 체크 (1분마다)
  setInterval(() => {
    const now = new Date();
    if (now.getHours() === 3 && now.getMinutes() === 0) {
      // 전체 집중시간 리셋
      totalFocusSeconds = 0;
      errandSeconds = 0;
      window._prevTotalFocus = 0;
      saveTotalFocus();
      document.getElementById('totalFocusDisplay').textContent = fmt(0);
      // 업무 기록 리셋
      document.getElementById('logList').innerHTML = '<li class="log-empty">업무 기록이 여기에 쌓입니다</li>';
      sheetPost({ action: 'clearLogs' });
    }
  }, 60000);
  let nextCheckin = 15 * 60;
  const INTERVAL = 15 * 60;
  let ticker = null;
  let currentErrandName = '';

  const EMAIL_TO = '100shtax@gmail.com';
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxInoRviHvlZ4nNBCHDUsYQ4CNpP8wcIERLIwhc12y96ZsVplYZIY5Lj6b12tLLRlqs/exec';
  const STORAGE_KEY = 'baek_work_log';

  const REVIEW_ITEMS = [
    '오류나 빠진 항목은 없나요?',
    '숫자/금액이 정확한가요?',
    '저장 또는 제출을 했나요?',
    '다음에 이어서 할 일을 메모해뒀나요?'
  ];

  const MODE_INFO = {
    idle:    { label: '대기',     badge: '대기',     timerClass: 'idle',  badgeClass: 'idle' },
    focus:   { label: '집중 중',  badge: '🟢 집중',  timerClass: 'main',  badgeClass: 'focus' },
    paused:  { label: '일시정지', badge: '⏸ 정지',  timerClass: 'idle',  badgeClass: 'paused' },
    errand:  { label: '돌발업무 중',  badge: '📋 돌발업무',  timerClass: 'sub',   badgeClass: 'errand' },
    meal:    { label: '식사 중',  badge: '🍱 식사',  timerClass: 'sub',   badgeClass: 'meal' },
    meeting: { label: '미팅 중',  badge: '🤝 미팅',  timerClass: 'sub',   badgeClass: 'meeting' },
    rest:    { label: '휴식 중',  badge: '☕ 휴식',  timerClass: 'sub',   badgeClass: 'rest' },
  };

  // ── 저장 ───────────────────────────────────────
  function saveToStorage() {
    const entries = [];
    document.querySelectorAll('#logList .log-item').forEach(li => {
      entries.push({
        time: li.querySelector('.log-time').textContent,
        type: li.querySelector('.log-text').className.replace('log-text ', ''),
        text: li.querySelector('.log-text').textContent
      });
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ entries, savedAt: new Date().toISOString() }));
  }

  function loadFromStorage() {
    try {
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (!data || !data.entries || !data.entries.length) return;

      // 새벽 3시 리셋 체크
      const now = new Date();
      const resetTime = new Date(now);
      resetTime.setHours(3, 0, 0, 0);
      const savedDate = data.savedAt ? new Date(data.savedAt) : null;
      if (savedDate && now >= resetTime && savedDate < resetTime) {
        localStorage.removeItem(STORAGE_KEY);
        return;
      }

      const list = document.getElementById('logList');
      list.innerHTML = '';
      data.entries.forEach(e => {
        const li = document.createElement('li');
        li.className = 'log-item';
        li.innerHTML = `<span class="log-time">${e.time}</span><span class="log-text ${e.type}">${e.text}</span>`;
        list.appendChild(li);
      });
    } catch(e) {}
  }

  window.addEventListener('load', () => {
    updateUI(); // 버튼 상태 초기화
    // 저장된 로그인 정보 복원 시도
    try {
      const saved = JSON.parse(localStorage.getItem('auth_user'));
      if (saved && saved.expires > Date.now()) {
        authUser = { username: saved.username, password: saved.password, name: saved.name, email: saved.email || '', ccEmail: saved.ccEmail || '' };
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('loggedInName').textContent = saved.name + '님';
        updateTodoUI();
        loadLogsFromSheet();
        loadTotalFocusFromSheet();
      }
    } catch(e) {}
  });

  // ── 유틸 ───────────────────────────────────────
  function pad(n) { return String(n).padStart(2, '0'); }
  function fmt(s) { return `${pad(Math.floor(s/3600))}:${pad(Math.floor((s%3600)/60))}:${pad(s%60)}`; }
  function nowStr() { const d = new Date(); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`;
  }

  // ── 로그인 ────────────────────────────────────────
  function doLogin() {
    const username = document.getElementById('loginId').value.trim();
    const password = document.getElementById('loginPw').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginError');

    if (!username || !password) {
      err.textContent = '아이디와 비밀번호를 입력해주세요';
      return;
    }

    btn.disabled = true;
    btn.textContent = '확인 중...';
    err.textContent = '';

    fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'login', username, password }),
      headers: { 'Content-Type': 'text/plain' },
      redirect: 'follow'
    })
    .then(r => r.json())
    .then(res => {
      if (res.success) {
        authUser = { username, password, name: res.name, email: res.email, ccEmail: res.ccEmail || '' };
        // 24시간 로그인 유지
        localStorage.setItem('auth_user', JSON.stringify({
          username, password, name: res.name, email: res.email, ccEmail: res.ccEmail || '',
          expires: Date.now() + 24 * 60 * 60 * 1000
        }));
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('loggedInName').textContent = res.name + '님';
        loadLogsFromSheet();
        loadTotalFocusFromSheet();
      } else {
        err.textContent = res.message || '로그인 실패';
        btn.disabled = false;
        btn.textContent = '로그인';
      }
    })
    .catch(() => {
      err.textContent = '서버 연결 실패. 잠시 후 다시 시도해주세요';
      btn.disabled = false;
      btn.textContent = '로그인';
    });
  }

  function showRegister() {
    document.getElementById('loginScreen').style.display = 'none';
    const rs = document.getElementById('registerScreen');
    rs.style.display = 'flex';
    document.getElementById('regId').value = '';
    document.getElementById('regPw').value = '';
    document.getElementById('regName').value = '';
    document.getElementById('regError').textContent = '';
    document.getElementById('regBtn').disabled = false;
    document.getElementById('regBtn').textContent = '가입하기';
  }

  function showLogin() {
    document.getElementById('registerScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('loginError').textContent = '';
  }

  function doRegister() {
    const username = document.getElementById('regId').value.trim();
    const password = document.getElementById('regPw').value;
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const btn = document.getElementById('regBtn');
    const err = document.getElementById('regError');

    if (!username || username.length < 4) { err.textContent = '아이디는 4자 이상이어야 해요'; return; }
    if (!password || password.length < 6) { err.textContent = '비밀번호는 6자 이상이어야 해요'; return; }
    if (!name) { err.textContent = '닉네임을 입력해주세요'; return; }
    if (!email || !email.includes('@')) { err.textContent = '이메일 주소를 올바르게 입력해주세요'; return; }

    btn.disabled = true;
    btn.textContent = '가입 중...';
    err.textContent = '';

    fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'register', username, password, name, email }),
      headers: { 'Content-Type': 'text/plain' },
      redirect: 'follow'
    })
    .then(r => r.json())
    .then(res => {
      if (res.success) {
        // 가입 성공 → 자동 로그인
        authUser = { username, password, name, email };
        localStorage.setItem('auth_user', JSON.stringify({
          username, password, name, email,
          expires: Date.now() + 24 * 60 * 60 * 1000
        }));
        document.getElementById('registerScreen').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('loggedInName').textContent = name + '님';
        loadLogsFromSheet();
        loadTotalFocusFromSheet();
      } else {
        err.textContent = res.message || '가입 실패';
        btn.disabled = false;
        btn.textContent = '가입하기';
      }
    })
    .catch(() => {
      err.textContent = '서버 연결 실패. 잠시 후 다시 시도해주세요';
      btn.disabled = false;
      btn.textContent = '가입하기';
    });
  }

  // ── 할일 목록 ────────────────────────────────────
  function pickTodo(idx) {
    const val = document.getElementById(`todo${idx + 1}`).value.trim();
    if (!val) return;
    currentTodoIdx = idx;
    document.getElementById('taskInput').value = val;
    // 집중할 업무 입력창 하이라이트
    const taskInput = document.getElementById('taskInput');
    taskInput.style.borderColor = 'var(--accent)';
    taskInput.focus();
    setTimeout(() => { taskInput.style.borderColor = ''; }, 1500);
  }

  function syncCurrentTodo() {
    // 할일 목록에서 현재 인덱스의 값을 taskInput에 반영
    todoList = [1,2,3,4,5].map(i => document.getElementById(`todo${i}`).value.trim());
    const current = todoList[currentTodoIdx];
    if (current) document.getElementById('taskInput').value = current;
  }

  function markTodoDone() {
    // 현재 할일 완료 처리
    const input = document.getElementById(`todo${currentTodoIdx + 1}`);
    if (input) input.classList.add('done');
    // 다음 할일로 이동
    let next = currentTodoIdx + 1;
    while (next < 5 && !todoList[next]) next++;
    if (next < 5) {
      currentTodoIdx = next;
      document.getElementById('taskInput').value = todoList[next];
      // 다음 할일 하이라이트
    } else {
      currentTodoIdx = 0;
      document.getElementById('taskInput').value = '';
    }
    updateTodoUI();
  }

  function updateTodoUI() {
    const isBusy = mode !== 'idle';
    [1,2,3,4,5].forEach(i => {
      const input = document.getElementById(`todo${i}`);
      const btn = input ? input.parentElement.querySelector('.todo-pick-btn') : null;
      if (input) input.disabled = isBusy;
      if (btn) btn.disabled = isBusy;
    });
  }

  function doLogout() {
    localStorage.removeItem('auth_user');
    authUser = { username: '', password: '', name: '' };
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('loginId').value = '';
    document.getElementById('loginPw').value = '';
    document.getElementById('loginError').textContent = '';
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginBtn').textContent = '로그인';
    // 상태 초기화
    if (ticker) clearInterval(ticker);
    mode = 'idle';
    mainSeconds = 0; subSeconds = 0; errandSeconds = 0;
    totalFocusSeconds = 0; window._prevTotalFocus = 0;
    document.getElementById('logList').innerHTML = '<li class="log-empty">업무 기록이 여기에 쌓입니다</li>';
    document.getElementById('totalFocusDisplay').textContent = '00:00:00';
    [1,2,3,4,5].forEach(i => {
      const el = document.getElementById(`todo${i}`);
      if (el) { el.value = ''; el.classList.remove('done'); el.disabled = false; el.style.borderColor = ''; }
    });
    currentTodoIdx = 0;
    todoList = ['','','','',''];
    updateUI();
  }

  // ── UI 업데이트 ────────────────────────────────
  function updateUI() {
    const info = MODE_INFO[mode];
    const td = document.getElementById('timerDisplay');
    const tl = document.getElementById('timerLabel');
    const sb = document.getElementById('statusBadge');

    // 타이머 표시: 중단 중이면 sub, 아니면 main
    const isInterrupt = ['errand','meal','meeting','rest'].includes(mode);
    td.textContent = fmt(isInterrupt ? subSeconds : mainSeconds);
    td.className = `timer-display ${info.timerClass}`;
    tl.textContent = isInterrupt ? `${info.badge} 경과` : (mode === 'focus' ? '집중 시간' : info.label);
    tl.className = `timer-label ${info.timerClass}`;
    sb.textContent = info.badge;
    sb.className = `status-badge ${info.badgeClass}`;

    // 체크인 표시
    const nci = document.getElementById('nextCheckin');
    nci.style.visibility = mode === 'focus' ? 'visible' : 'hidden';

    // 메인 버튼
    const startBtn = document.getElementById('startBtn');
    if (mode === 'idle') {
      startBtn.textContent = '▶ 집중 시작';
      startBtn.className = 'btn btn-focus';
      startBtn.disabled = false;
    } else if (mode === 'focus') {
      startBtn.textContent = '⏸ 일시정지';
      startBtn.className = 'btn btn-pause';
      startBtn.disabled = false;
    } else if (mode === 'paused') {
      startBtn.textContent = '▶ 재개하기';
      startBtn.className = 'btn btn-resume';
      startBtn.disabled = false;
    } else {
      startBtn.textContent = '⏸ 일시정지';
      startBtn.className = 'btn btn-pause';
      startBtn.disabled = true;
    }

    // 검토/종료 버튼
    const reviewBtn = document.getElementById('reviewBtn');
    if (mode === 'idle') {
      reviewBtn.disabled = true;
      reviewBtn.textContent = '🔍 검토하기';
    } else if (mode === 'errand') {
      reviewBtn.disabled = false;
      reviewBtn.textContent = '🔍 돌발업무 검토';
    } else if (['meal','meeting','rest'].includes(mode)) {
      reviewBtn.disabled = false;
      reviewBtn.textContent = '↩ 복귀';
    } else {
      // focus, paused
      reviewBtn.disabled = false;
      reviewBtn.textContent = '🔍 검토하기';
    }

    // 인터럽트 버튼들
    const interruptActive = mode === 'focus';
    ['btnErrand','btnMeal','btnMeeting','btnRest'].forEach(id => {
      document.getElementById(id).disabled = !interruptActive;
    });

    // 복귀 버튼
    const returnRow = document.getElementById('returnRow');
    if (isInterrupt) {
      returnRow.classList.add('show');
    } else {
      returnRow.classList.remove('show');
    }

    // 입력창
    document.getElementById('taskInput').disabled = mode !== 'idle';
  }

  // ── 메인 버튼 핸들러 ───────────────────────────
  function handleMainBtn() {
    if (mode === 'idle') {
      const task = document.getElementById('taskInput').value.trim();
      if (!task) {
        document.getElementById('taskInput').focus();
        document.getElementById('taskInput').style.borderColor = 'var(--accent2)';
        setTimeout(() => document.getElementById('taskInput').style.borderColor = '', 1500);
        return;
      }
      startFocus(task);
    } else if (mode === 'focus') {
      pauseFocus();
    } else if (mode === 'paused') {
      resumeFocus();
    }
  }

  // ── 집중 시작 ──────────────────────────────────
  function startFocus(task) {
    mode = 'focus';
    isRunning = true;
    mainSeconds = 0;
    errandSeconds = 0;
    // 이전 세션 누적값 보존
    window._prevTotalFocus = totalFocusSeconds;
    nextCheckin = INTERVAL;
    segmentStart = Date.now();
    mainSecondsBase = 0;
    clearInterval(ticker);
    ticker = setInterval(tick, 1000);
    addLog('system', `▶ 집중 시작: ${task}`);
    // 할일 입력창 비활성화
    updateTodoUI();
    updateUI();
  }

  function pauseFocus() {
    mode = 'paused';
    clearInterval(ticker);
    segmentStart = null;
    addLog('system', `⏸ 일시정지 (집중 ${Math.floor(mainSeconds/60)}분)`);
    updateUI();
  }

  function resumeFocus() {
    mode = 'focus';
    mainSecondsBase = mainSeconds;
    segmentStart = Date.now();
    clearInterval(ticker);
    ticker = setInterval(tick, 1000);
    addLog('system', `▶ 재개`);
    updateUI();
  }

  // ── 인터럽트 ───────────────────────────────────
  function startInterrupt(type) {
    if (type === 'errand') {
      document.getElementById('errandInput').value = '';
      document.getElementById('errandOverlay').classList.add('show');
      setTimeout(() => document.getElementById('errandInput').focus(), 300);
      return;
    }
    applyInterrupt(type, '');
  }

  function confirmErrand() {
    const name = document.getElementById('errandInput').value.trim();
    document.getElementById('errandOverlay').classList.remove('show');
    applyInterrupt('errand', name);
  }

  function cancelErrand() {
    document.getElementById('errandOverlay').classList.remove('show');
  }

  function applyInterrupt(type, name) {
    mode = type;
    subSeconds = 0; subSecondsBase = 0;
    if (type === 'errand') { errandSecondsBase = errandSeconds; }
    segmentStart = Date.now();
    currentErrandName = name;
    clearInterval(ticker);
    ticker = setInterval(tick, 1000);

    const labels = { errand: `📋 돌발업무 시작${name ? `: ${name}` : ''}`, meal: '🍱 식사 시작', meeting: '🤝 미팅 시작', rest: '☕ 휴식 시작' };
    addLog(type, labels[type]);
    updateUI();
  }

  function returnToMain() {
    const type = mode;
    const elapsed = Math.floor(subSeconds / 60);
    const labels = { errand: `📋 돌발업무 종료${currentErrandName ? ` (${currentErrandName})` : ''} — ${elapsed}분`, meal: `🍱 식사 종료 — ${elapsed}분`, meeting: `🤝 미팅 종료 — ${elapsed}분`, rest: `☕ 휴식 종료 — ${elapsed}분` };
    addLog('return', labels[type] || `종료 — ${elapsed}분`);

    mode = 'focus';
    subSeconds = 0;
    mainSecondsBase = mainSeconds;
    segmentStart = Date.now();
    currentErrandName = '';
    clearInterval(ticker);
    ticker = setInterval(tick, 1000);
    addLog('system', '▶ 집중 업무 재개');
    updateUI();
  }

  // ── 타이머 틱 ──────────────────────────────────
  function tick() {
    if (!segmentStart) { segmentStart = Date.now(); }
    const elapsed = Math.floor((Date.now() - segmentStart) / 1000);

    if (mode === 'focus') {
      mainSeconds = mainSecondsBase + elapsed;
      const remaining = nextCheckin - mainSeconds;
      const rm = Math.floor(Math.max(0, remaining) / 60);
      const rs = Math.max(0, remaining) % 60;
      document.getElementById('nextCheckin').innerHTML = `다음 체크인까지 <span>${pad(rm)}:${pad(rs)}</span>`;
      document.getElementById('progressBar').style.width = `${Math.max(0, ((INTERVAL - remaining) / INTERVAL) * 100)}%`;
      if (mainSeconds >= nextCheckin) { nextCheckin += INTERVAL; showCheckin(); }
    } else if (['errand','meal','meeting','rest'].includes(mode)) {
      subSeconds = subSecondsBase + elapsed;
      if (mode === 'errand') errandSeconds = errandSecondsBase + elapsed;
    }

    const isInterrupt = ['errand','meal','meeting','rest'].includes(mode);
    document.getElementById('timerDisplay').textContent = fmt(isInterrupt ? subSeconds : mainSeconds);
    totalFocusSeconds = (window._prevTotalFocus || 0) + mainSeconds + errandSeconds;
    document.getElementById('totalFocusDisplay').textContent = fmt(totalFocusSeconds);
    if ((mainSeconds + errandSeconds) % 30 === 0) saveTotalFocus();
    lastTickTime = Date.now();
  }

  // ── 체크인 팝업 ────────────────────────────────
  function showCheckin() {
    const task = document.getElementById('taskInput').value;
    document.getElementById('popupTask').textContent = `「${task}」`;
    document.getElementById('popupElapsed').textContent = `${Math.floor(mainSeconds/60)}분 경과`;
    document.getElementById('popupInput').value = '';
    document.getElementById('checkinOverlay').classList.add('show');
    setTimeout(() => document.getElementById('popupInput').focus(), 300);
  }

  function submitCheckin(focused) {
    const note = document.getElementById('popupInput').value.trim();
    document.getElementById('checkinOverlay').classList.remove('show');
    if (focused) addLog('focus', `✅ 집중 중${note ? ` — ${note}` : ''}`);
    else addLog('distract', `😅 딴짓${note ? ` — ${note}` : ''}`);
  }

  // ── 검토 버튼 핸들러 ─────────────────────────────
  function handleReviewBtn() {
    if (mode === 'errand') {
      showErrandReview();
    } else if (['meal','meeting','rest'].includes(mode)) {
      returnToMain();
    } else {
      showReview();
    }
  }

  // 잡무/중단 검토 팝업 (메인 업무는 유지)
  function showErrandReview() {
    const cl = document.getElementById('reviewChecklist');
    cl.innerHTML = '';
    const errandItems = [
      '요청한 내용을 정확히 처리했나요?',
      '관련 서류나 메모를 남겼나요?',
      '추가 후속 조치가 필요한 건 없나요?',
    ];
    errandItems.forEach(item => {
      const div = document.createElement('div');
      div.className = 'review-item';
      div.innerHTML = `<div class="review-check">✓</div><div class="review-item-text">${item}</div>`;
      div.addEventListener('click', () => {
        div.classList.toggle('checked');
        const done = document.querySelectorAll('.review-item.checked').length;
        document.getElementById('reviewDone').textContent = done;
        document.getElementById('finishBtn').disabled = done < errandItems.length;
      });
      cl.appendChild(div);
    });
    document.getElementById('reviewTotal').textContent = errandItems.length;
    document.getElementById('reviewDone').textContent = 0;
    document.getElementById('finishBtn').disabled = true;
    // 검토완료 버튼 → 돌발업무 종료 후 복귀
    document.getElementById('finishBtn').onclick = () => {
      document.getElementById('reviewOverlay').classList.remove('show');
      addLog('review', '🔍 돌발업무 검토 완료');
      returnToMain();
    };
    // 그냥 종료 → 그냥 복귀
    document.querySelector('#reviewOverlay .popup-btn.neutral').onclick = () => {
      document.getElementById('reviewOverlay').classList.remove('show');
      returnToMain();
    };
    document.getElementById('reviewOverlay').classList.add('show');
  }

  // ── 검토 팝업 ──────────────────────────────────
  function showReview() {
    const cl = document.getElementById('reviewChecklist');
    cl.innerHTML = '';
    REVIEW_ITEMS.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'review-item';
      div.innerHTML = `<div class="review-check">✓</div><div class="review-item-text">${item}</div>`;
      div.addEventListener('click', () => {
        div.classList.toggle('checked');
        const done = document.querySelectorAll('.review-item.checked').length;
        document.getElementById('reviewDone').textContent = done;
        document.getElementById('finishBtn').disabled = done < REVIEW_ITEMS.length;
      });
      cl.appendChild(div);
    });
    document.getElementById('reviewTotal').textContent = REVIEW_ITEMS.length;
    document.getElementById('reviewDone').textContent = 0;
    document.getElementById('finishBtn').disabled = true;
    document.getElementById('finishBtn').onclick = finishSession;
    document.querySelector('#reviewOverlay .popup-btn.neutral').onclick = skipReview;
    document.getElementById('reviewOverlay').classList.add('show');
  }

  function finishSession() {
    document.getElementById('reviewOverlay').classList.remove('show');
    addLog('review', '🔍 검토 완료 후 종료');
    doStop(true);
  }

  function skipReview() {
    document.getElementById('reviewOverlay').classList.remove('show');
    doStop(false);
  }

  function doStop(reviewed) {
    clearInterval(ticker);
    addLog('system', `⏹ 업무 종료 ${reviewed ? '(검토완료)' : '(검토생략)'} — 집중 총 ${Math.floor(mainSeconds/60)}분`);
    mode = 'idle';
    isRunning = false;
    mainSeconds = 0;
    subSeconds = 0;
    errandSeconds = 0;
    mainSecondsBase = 0; subSecondsBase = 0; errandSecondsBase = 0;
    segmentStart = null;
    window._prevTotalFocus = totalFocusSeconds;
    saveTotalFocus();
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('nextCheckin').style.visibility = 'hidden';
    markTodoDone();
    updateTodoUI();
    updateUI();
  }

  // ── 로그 ───────────────────────────────────────
  function addLog(type, text) {
    const timeStr = nowStr();
    appendLogItem(timeStr, type, text);
    // 구글 시트에 저장 (단일 소스)
    sheetPost({ action: 'addLog', time: timeStr, type, text });
  }

  function appendLogItem(timeStr, type, text) {
    const list = document.getElementById('logList');
    const empty = list.querySelector('.log-empty');
    if (empty) empty.remove();
    const li = document.createElement('li');
    li.className = 'log-item';
    li.innerHTML = `<span class="log-time">${timeStr}</span><span class="log-text ${type}">${text}</span>`;
    list.insertBefore(li, list.firstChild);
  }

  function clearLog() {
    if (!confirm('업무 기록을 모두 삭제할까요?')) return;
    document.getElementById('logList').innerHTML = '<li class="log-empty">업무 기록이 여기에 쌓입니다</li>';
    sheetPost({ action: 'clearLogs' });
  }

  // ── 구글 시트 연동 ────────────────────────────────
  function sheetPost(data) {
    fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ ...data, username: authUser.username, password: authUser.password }),
      headers: { 'Content-Type': 'text/plain' },
      redirect: 'follow'
    })
    .then(r => r.json())
    .then(res => { if (!res.success) console.log('시트 오류:', res.message); })
    .catch(e => console.log('시트 저장 오류:', e.message));
  }

  function loadLogsFromSheet() {
    const list = document.getElementById('logList');
    list.innerHTML = '<li class="log-empty">불러오는 중...</li>';
    fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'getLogs', username: authUser.username, password: authUser.password }),
      headers: { 'Content-Type': 'text/plain' },
      redirect: 'follow'
    })
      .then(r => r.json())
      .then(data => {
        list.innerHTML = '';
        if (!data.success || !data.logs || !data.logs.length) {
          list.innerHTML = '<li class="log-empty">업무 기록이 여기에 쌓입니다</li>';
          return;
        }
        // 시트는 오래된 순 → 최신이 위로 오도록 역순 표시
        [...data.logs].reverse().forEach(entry => {
          const li = document.createElement('li');
          li.className = 'log-item';
          li.innerHTML = `<span class="log-time">${entry.time}</span><span class="log-text ${entry.type}">${entry.text}</span>`;
          list.appendChild(li);
        });
      })
      .catch(e => {
        list.innerHTML = '<li class="log-empty">불러오기 실패 (오프라인?)</li>';
        console.log('시트 불러오기 오류:', e);
      });
  }

  function loadTotalFocusFromSheet() {
    fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'getTotalFocus', username: authUser.username, password: authUser.password }),
      headers: { 'Content-Type': 'text/plain' },
      redirect: 'follow'
    })
      .then(r => r.json())
      .then(data => {
        if (!data.success) return;
        // 새벽 3시 리셋 체크
        const now = new Date();
        const resetTime = new Date(now);
        resetTime.setHours(3, 0, 0, 0);
        const savedDate = localStorage.getItem(TOTAL_DATE_KEY) ? new Date(localStorage.getItem(TOTAL_DATE_KEY)) : null;
        if (savedDate && now >= resetTime && savedDate < resetTime) {
          totalFocusSeconds = 0;
        } else {
          totalFocusSeconds = data.seconds || 0;
        }
        window._prevTotalFocus = totalFocusSeconds;
        document.getElementById('totalFocusDisplay').textContent = fmt(totalFocusSeconds);
        localStorage.setItem(TOTAL_KEY, totalFocusSeconds);
        localStorage.setItem(TOTAL_DATE_KEY, new Date().toISOString());
      })
      .catch(e => console.log('집중시간 불러오기 오류:', e));
  }

  // ── 절전모드 복귀 시 시간 보정 ───────────────────
  let lastTickTime = Date.now();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      const gap = Math.floor((Date.now() - lastTickTime) / 1000);
      if (gap > 5 && isRunning) {
        // 절전 중 경과한 시간 보정
        if (mode === 'focus') {
          mainSeconds += gap;
          // 체크인 넘어갔으면 처리
          while (mainSeconds >= nextCheckin) {
            nextCheckin += INTERVAL;
            showCheckin();
          }
        } else if (['errand','meal','meeting','rest'].includes(mode)) {
          subSeconds += gap;
        }
        totalFocusSeconds = (window._prevTotalFocus || 0) + mainSeconds + errandSeconds;
        document.getElementById('totalFocusDisplay').textContent = fmt(totalFocusSeconds);
        saveTotalFocus();
      }
    }
    lastTickTime = Date.now();
  });

  // tick마다 lastTickTime 갱신
  const _origTick = tick;

  // ── 메일 발송 ──────────────────────────────────
  function sendEmail() {
    const items = document.querySelectorAll('#logList .log-item');
    if (!items.length) { alert('보낼 기록이 없어요!'); return; }

    const task = document.getElementById('taskInput').value || '(업무명 없음)';
    const today = todayStr();

    let body = `[하루업무체크] ${today}\n`;
    body += `주요 업무: ${task}\n`;
    body += `━━━━━━━━━━━━━━━━━━━━━━━\n\n`;

    const rows = [];
    items.forEach(li => {
      const t = li.querySelector('.log-time').textContent;
      const txt = li.querySelector('.log-text').textContent;
      rows.push(`${t}  ${txt}`);
    });
    body += rows.join('\n');


    const subject = encodeURIComponent(`[업무일지] ${today}`);
    body += `\n\n━━━━━━━━━━━━━━━━━━━━━━━\n전체 집중시간: ${fmt(totalFocusSeconds)}`;
    const to = authUser.email || EMAIL_TO;
    let mailUrl = `mailto:${to}?subject=${subject}&body=${encodeURIComponent(body)}`;
    if (authUser.ccEmail) mailUrl += `&cc=${encodeURIComponent(authUser.ccEmail)}`;
    window.location.href = mailUrl;
  }

  // ── 키보드 ─────────────────────────────────────
  // 할일 엔터키 - 이벤트 위임
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const id = e.target.id;
    if (id === 'todo1') document.getElementById('todo2').focus();
    else if (id === 'todo2') document.getElementById('todo3').focus();
    else if (id === 'todo3') document.getElementById('todo4').focus();
    else if (id === 'todo4') document.getElementById('todo5').focus();
    else if (id === 'todo5') document.getElementById('taskInput').focus();
  });

  document.getElementById('loginId').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginPw').focus();
  });
  document.getElementById('loginPw').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('regId').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('regPw').focus();
  });
  document.getElementById('regPw').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('regName').focus();
  });
  document.getElementById('regName').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('regEmail').focus();
  });
  document.getElementById('regEmail').addEventListener('keydown', e => {
    if (e.key === 'Enter') doRegister();
  });

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleMainBtn();
  });

  document.getElementById('popupInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitCheckin(true);
  });

  document.getElementById('errandInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmErrand();
  });

</script>
</body>
</html>
